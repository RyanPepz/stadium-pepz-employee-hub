<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pepz POS Trainer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1520; color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* HEADER */
    .trainer-header {
      background: #1a2744; padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid #c8972a; flex-shrink: 0;
    }
    .trainer-header h2 { color: #c8972a; font-size: 14px; font-weight: 700; }
    .trainer-header .sub { font-size: 11px; color: #7b9cbf; margin-top: 2px; }
    .mode-badge {
      background: #c8972a; color: #1a2744;
      font-size: 10px; font-weight: 800;
      padding: 3px 10px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* LAYOUT */
    .pos-container { display: flex; flex: 1; overflow: hidden; }

    /* LEFT PANEL */
    .order-panel {
      width: 290px; min-width: 290px; background: #112030;
      border-right: 1px solid #1e3050;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .check-header {
      background: #1a2f4a; padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      border-bottom: 1px solid #1e3050;
    }
    .check-num { color: #7b9cbf; }
    .tab-name { background: #243a55; border-radius: 4px; padding: 2px 8px; font-size: 12px; color: #adc4e0; }
    .check-meta { padding: 8px 14px; border-bottom: 1px solid #1e3050; font-size: 12px; }
    .dine-type { color: #7b9cbf; margin-bottom: 6px; }
    .server-row { display: flex; align-items: center; gap: 6px; }
    .server-name { color: #adc4e0; font-weight: 600; }
    .meta-btn { background: #243a55; border: none; color: #adc4e0; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
    .share-bar { padding: 6px 14px; background: #182840; border-bottom: 1px solid #1e3050; font-size: 12px; color: #adc4e0; font-weight: 600; }
    .order-items { flex: 1; overflow-y: auto; padding: 4px 0; }
    .empty-order { padding: 28px 14px; color: #3a5a7a; font-size: 12px; text-align: center; line-height: 1.6; }
    .order-item { padding: 6px 14px; border-bottom: 1px solid #182840; font-size: 12px; }
    .order-item:hover { background: #182840; }
    .order-item-row { display: flex; align-items: flex-start; gap: 6px; }
    .item-qty { color: #7b9cbf; min-width: 14px; }
    .item-name { flex: 1; color: #e8e8e8; line-height: 1.4; }
    .item-price { color: #e8e8e8; font-weight: 600; white-space: nowrap; }
    .remove-btn { background: none; border: none; color: #4a6a8a; cursor: pointer; font-size: 15px; padding: 0 2px; line-height: 1; }
    .remove-btn:hover { color: #e05050; }
    .item-modifier { padding-left: 20px; margin-top: 4px; }
    .mod-label { font-size: 10px; color: #4a6a8a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .mod-tag { display: inline-block; background: #1a2c44; border: 1px solid #2a4060; color: #adc4e0; font-size: 10.5px; padding: 1px 7px; border-radius: 10px; margin: 1px 2px 1px 0; line-height: 1.6; }
    .mod-plain { color: #4a6a8a; font-size: 11px; font-style: italic; }
    .send-stay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 14px; border-top: 1px solid #1e3050; }
    .btn-stay, .btn-send { padding: 8px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #243a55; color: #adc4e0; }
    .btn-send:hover { background: #2a5a8a; color: white; }
    .totals-section { padding: 6px 14px; border-top: 1px solid #1e3050; font-size: 13px; }
    .total-row { display: flex; justify-content: space-between; padding: 2px 0; color: #adc4e0; }
    .action-buttons { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 6px; padding: 8px 14px 12px; }
    .btn-no-sale, .btn-print { background: #243a55; border: none; color: #adc4e0; padding: 10px 6px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-pay { background: #1e5a99; border: none; color: white; padding: 10px 6px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-pay:hover { background: #2a6aaa; }

    /* RIGHT PANEL */
    .menu-panel { flex: 1; background: #0d1824; display: flex; flex-direction: column; overflow: hidden; }
    .menu-top-bar { display: flex; align-items: center; padding: 8px 14px; gap: 10px; border-bottom: 1px solid #1e2e48; flex-shrink: 0; }
    .menu-search { flex: 1; background: #1a2c44; border: 1px solid #243a55; border-radius: 20px; padding: 7px 14px; display: flex; align-items: center; gap: 8px; }
    .menu-search input { background: none; border: none; outline: none; color: #adc4e0; font-size: 13px; width: 100%; }
    .menu-search input::placeholder { color: #3a5a7a; }
    .menu-grid { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
    .category-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .cat-button { padding: 11px 5px; border: none; border-radius: 6px; font-size: 10.5px; font-weight: 700; cursor: pointer; text-align: center; line-height: 1.25; text-transform: uppercase; color: white; min-height: 46px; transition: filter 0.1s, transform 0.1s; }
    .cat-button:hover { filter: brightness(1.2); }
    .cat-button:active { transform: scale(0.96); }
    .cat-button.active { outline: 2px solid white; outline-offset: 1px; }
    .cat-starters { background: #b56878; } .cat-wings { background: #9a5878; }
    .cat-chicken  { background: #b86820; } .cat-pizza   { background: #7a2018; }
    .cat-cone     { background: #6a1808; } .cat-calzones{ background: #7a1808; }
    .cat-salads   { background: #3a7a20; } .cat-dressings{ background: #1e2e48; }
    .cat-pasta    { background: #a890a0; color:#1a1a2a; } .cat-sauces { background: #1e2e48; }
    .cat-keto     { background: #8a2010; } .cat-cold-sw  { background: #5a5a28; }
    .cat-hot-sw   { background: #b86818; } .cat-desserts { background: #2a3a55; }
    .cat-soda     { background: #2a3a55; } .cat-alcohol  { background: #8a5a10; }
    .cat-catering { background: #3a3a4a; } .cat-merch    { background: #2a2a3a; }
    .cat-misc     { background: #1e2e48; font-size:10px; } .cat-daily { background: #7a1808; }
    .cat-event    { background: #1a58a8; } .cat-rewards  { background: #3a4a6a; font-size:10px; }
    .cat-gift     { background: #3a4a6a; font-size:10px; } .cat-house { background: #2a3a5a; font-size:10px; }
    .section-divider { height: 1px; background: #1e2e48; }
    .items-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .item-button { background: #1a2c44; border: 1px solid #243a55; border-radius: 6px; padding: 9px 7px; color: #e8e8e8; font-size: 11px; font-weight: 600; cursor: pointer; text-align: left; line-height: 1.3; min-height: 46px; transition: background 0.1s, transform 0.1s; }
    .item-button:hover { background: #243a55; }
    .item-button:active { transform: scale(0.96); }
    .item-price-tag { color: #7b9cbf; font-size: 10px; margin-top: 3px; display: block; }
    .sub-cat-button { background: #1a2c44; border: 2px solid #243a55; border-radius: 6px; padding: 9px 7px; color: #e8e8e8; font-size: 10.5px; font-weight: 700; cursor: pointer; text-align: center; min-height: 46px; text-transform: uppercase; transition: background 0.1s; line-height: 1.3; }
    .sub-cat-button:hover { background: #243a55; }
    .sub-cat-button.active { border-color: white; background: #243a55; }
    .no-items { color: #3a5a7a; font-size: 12px; padding: 12px 4px; }

    /* MODIFIER OVERLAY */
    .modifier-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modifier-overlay.active { display: flex; }
    .modifier-panel { background: #0e1c2e; border: 1px solid #243a55; border-radius: 12px; width: 92%; max-width: 680px; max-height: 88vh; overflow-y: auto; padding: 18px 20px; }
    .mod-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .qty-control { display: flex; align-items: center; gap: 12px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #3a5a7a; background: none; color: #adc4e0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-display { font-size: 18px; font-weight: 700; min-width: 24px; text-align: center; }
    .mod-actions { display: flex; gap: 8px; }
    .mod-action-btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: #243a55; color: #adc4e0; }
    .btn-done { background: #1e5a99; color: white; }
    .btn-done:hover { background: #2a6aaa; }
    .mod-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .mod-subtitle { font-size: 12px; color: #7b9cbf; margin-bottom: 14px; }
    .mod-tabs { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
    .mod-tab { padding: 7px 13px; border: 1px solid #243a55; border-radius: 6px; font-size: 11.5px; font-weight: 600; cursor: pointer; background: #1a2c44; color: #adc4e0; }
    .mod-tab.active { background: #243a55; border-color: white; color: white; }
    .mod-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .mod-option { padding: 9px 6px; border: 1px solid #243a55; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; background: #1a2c44; color: #e8e8e8; text-align: center; line-height: 1.3; min-height: 42px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
    .mod-option:hover { background: #243a55; }
    .mod-option.selected { background: #1e4a7a; border-color: #4a8aca; }

    /* TOAST */
    .feedback-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; }
    .feedback-toast.show { opacity: 1; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #243a55; border-radius: 2px; }
    @media (max-width: 680px) {
      .order-panel { width: 230px; min-width: 230px; }
      .category-grid, .items-grid, .mod-options { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

    <div class="send-stay-row">

    <div class="totals-section">

    <div class="action-buttons">

</div>

<div class="modifier-overlay" id="modifierOverlay">

  // ── STATE ──────────────────────────────────────────────────────
  let activeCat = null, activeSub = null, orderItems = [];

  // ── RENDER MENU ────────────────────────────────────────────────
  function renderMenu() {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';
    const catGrid = document.createElement('div');
    catGrid.className = 'category-grid';
    CATEGORIES.forEach(c => {
      const btn = document.createElement('button');
      btn.className = `cat-button ${c.cls}${activeCat===c.id?' active':''}`;
      btn.textContent = c.label;
      btn.onclick = () => { activeCat = c.id; activeSub = null; renderMenu(); };
      catGrid.appendChild(btn);
    });
    grid.appendChild(catGrid);
    if (!activeCat) return;
    grid.appendChild(mkDivider());
    const data = MENU[activeCat];
    if (!data) return;
    if (Array.isArray(data)) {
      data.length ? grid.appendChild(mkItemGrid(data)) : grid.appendChild(mkNoItems());
      return;
    }
    const subGrid = document.createElement('div');
    subGrid.className = 'items-grid';
    data.subs.forEach(s => {
      const btn = document.createElement('button');
      btn.className = `sub-cat-button${activeSub===s.id?' active':''}`;
      btn.textContent = s.label;
      btn.onclick = () => { activeSub = s.id; renderMenu(); };
      subGrid.appendChild(btn);
    });
    grid.appendChild(subGrid);
    if (activeSub && data.items[activeSub]) {
      grid.appendChild(mkDivider());
      grid.appendChild(mkItemGrid(data.items[activeSub]));
    }
  }

  function mkDivider() { const d = document.createElement('div'); d.className = 'section-divider'; return d; }
  function mkNoItems() { const d = document.createElement('div'); d.className = 'no-items'; d.textContent = 'No items for this category.'; return d; }

  function mkItemGrid(items) {
    const g = document.createElement('div');
    g.className = 'items-grid';
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'item-button';
      btn.innerHTML = `${item.name}<span class="item-price-tag">$${item.price.toFixed(2)}</span>`;
      btn.onclick = () => addItem(item);
      g.appendChild(btn);
    });
    return g;
  }

  // ── RENDER ORDER ───────────────────────────────────────────────
  function renderOrder() {
    const container = document.getElementById('orderItems');
    if (!orderItems.length) {
      container.innerHTML = '<div class="empty-order">No items yet.<br>Tap a category to start.</div>';
      updateTotals(0); return;
    }
    let sub = 0;
    container.innerHTML = '';
    orderItems.forEach((item, idx) => {
      sub += item.price;
      const div = document.createElement('div');
      div.className = 'order-item';
      div.innerHTML = `
        <div class="order-item-row">
          <span class="item-qty">1</span>
          <span class="item-name">${item.name}</span>
          <span class="item-price">$${item.price.toFixed(2)}</span>
          <button class="remove-btn" onclick="removeItem(${idx})">×</button>
        </div>
        ${item.modifier ? renderModifier(item.modifier) : ''}
      `;
      container.appendChild(div);
    });
    updateTotals(sub);
  }

  function updateTotals(sub) {
    const tax = sub * TAX;
    document.getElementById('subtotal').textContent = '$' + sub.toFixed(2);
    document.getElementById('tax').textContent = '$' + tax.toFixed(2);
    document.getElementById('payBtn').textContent = 'Pay $' + (sub + tax).toFixed(2);
  }

  function addItem(item) {
    if (item.mod === 'wings')           { showWingsMod(item);              return; }
    if (item.mod === 'cone')            { showConeMod();                    return; }
    if (item.mod === 'pizza-toppings')  { showToppingsMod(item, 'pizza', item.maxTop); return; }
    if (item.mod === 'pasta-toppings')  { showToppingsMod(item, 'pasta');  return; }
    if (item.mod === 'salad-dressing')  { showDressingMod(item);           return; }
    if (item.mod === 'specialty-pizza') { showSpecialtyMod(item);          return; }
    orderItems.push({ name: item.name, price: item.price });
    renderOrder();
    toast('Added: ' + item.name);
  }

  function renderModifier(mod) {
    if (!mod) return '';
    // Detect label prefix like "Pizza: ..." or "Pasta: ..."
    const labelMatch = mod.match(/^([^:]+):\s*(.+)$/);
    const label = labelMatch ? labelMatch[1] : null;
    const items = (labelMatch ? labelMatch[2] : mod).split(',').map(s => s.trim()).filter(Boolean);
    const tags = items.map(t => `<span class="mod-tag">${t}</span>`).join('');
    return `<div class="item-modifier">${label ? `<div class="mod-label">${label}</div>` : ''}${tags}</div>`;
  }

  function removeItem(idx) { orderItems.splice(idx, 1); renderOrder(); }
  function clearOrder()    { orderItems = []; renderOrder(); toast('Order cleared'); }

  // ── MODIFIER STATE ─────────────────────────────────────────────
  let _topItem = null, _topType = null, _topSel = [], _topMax = 5;
  let _wingItem = null, _selectedSauce = null;
  let _coneStep = 'type', _selectedToppings = [], _selectedPasta = null;
  let _dressingItem = null, _selectedDressing = null;
  let _specItem = null, _specSize = null, _specRemovals = [];

  // ── EVENT DELEGATION — single listener handles all modifier clicks
  document.getElementById('modifierPanel').addEventListener('click', function(e) {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const val    = btn.dataset.val || '';

    if (action === 'close')        { closeMod(); }
    else if (action === 'confirm-wings')    { confirmWings(); }
    else if (action === 'confirm-toppings') { confirmToppings(); }
    else if (action === 'confirm-dressing') { confirmDressing(); }
    else if (action === 'confirm-specialty') { confirmSpecialty(); }
    else if (action === 'pick-spec-size') {
      document.querySelectorAll('#modifierPanel .spec-size-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      _specSize = { label: val, price: parseFloat(btn.dataset.price) };
      const doneBtn = document.querySelector('#modifierPanel .btn-done');
      if (doneBtn) doneBtn.textContent = '✓ Done  $' + _specSize.price.toFixed(2);
    }
    else if (action === 'toggle-spec-remove') {
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        _specRemovals = _specRemovals.filter(r => r !== val);
      } else {
        btn.classList.add('selected');
        _specRemovals.push(val);
      }
    }
    else if (action === 'confirm-cone-top') { confirmConeTopping(); }
    else if (action === 'confirm-cone-pasta'){ confirmConePasta(); }
    else if (action === 'pick-dressing') {
      document.querySelectorAll('#modifierPanel .mod-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      _selectedDressing = val;
    }
    else if (action === 'pick-sauce') {
      document.querySelectorAll('#modifierPanel .mod-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      _selectedSauce = val;
    }
    else if (action === 'toggle-top') {
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        _topSel = _topSel.filter(t => t !== val);
      } else {
        if (_topSel.length >= _topMax) { toast('⚠️ Max ' + _topMax + ' toppings', 'err'); return; }
        btn.classList.add('selected');
        _topSel.push(val);
      }
    }
    else if (action === 'pick-cone-type') { _coneStep = val; renderConeStep(); }
    else if (action === 'toggle-cone-top') {
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        _selectedToppings = _selectedToppings.filter(x => x !== val);
      } else {
        if (_selectedToppings.length >= 2) { toast('⚠️ Max 2 toppings', 'err'); return; }
        btn.classList.add('selected');
        _selectedToppings.push(val);
      }
    }
    else if (action === 'pick-cone-pasta') {
      document.querySelectorAll('#modifierPanel .mod-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      _selectedPasta = val;
    }
  });

  // ── TOPPINGS MODIFIER ──────────────────────────────────────────

  function confirmToppings() {
    const label = _topType === 'pasta' ? 'Add-ins' : _topType === 'sandwich' ? 'Modifications' : 'Toppings';

    orderItems.push({ name: _topItem.name, price: _topItem.price, modifier });
    renderOrder(); closeMod();
    toast('Added: ' + _topItem.name);
  }

      </div>
      <div class="mod-options">
        ${WING_SAUCES.map(s => `<button class="mod-option" data-action="pick-sauce" data-val="${s.replace(/"/g,'&quot;')}">${s}</button>`).join('')}
      </div>`;
    openMod();
  }

  function confirmWings() {
    if (!_selectedSauce) { toast('⚠️ Select a wing sauce first', 'err'); return; }
    orderItems.push({ name: _wingItem.name, price: _wingItem.price, modifier: _selectedSauce });
    renderOrder(); closeMod();
    toast('Added: ' + _wingItem.name + ' — ' + _selectedSauce);
  }

  // ── SPECIALTY PIZZA MODIFIER ───────────────────────────────────
  function showSpecialtyMod(item) {
    _specItem = item; _specSize = null; _specRemovals = [];
    const data = SPECIALTY_DATA[item.name] || { sizes: SZ_A, ing: [] };
    document.getElementById('modifierPanel').innerHTML = `
      <div class="mod-header">
        <div class="qty-control">
          <button class="qty-btn">−</button><div class="qty-display">1</div><button class="qty-btn">+</button>
        </div>
        <div class="mod-actions">
          <button class="mod-action-btn btn-cancel" data-action="close">✕ Cancel</button>
          <button class="mod-action-btn btn-done" data-action="confirm-specialty">✓ Done</button>
        </div>
      </div>
      <div class="mod-title">${item.name}</div>
      <div class="mod-subtitle">Select a size (required), then remove any ingredients</div>
      <div class="mod-tabs">
        <button class="mod-tab active">SIZE</button>
        <button class="mod-tab">REMOVE INGREDIENTS</button>
        <button class="mod-tab">Special Request</button>
        <button class="mod-tab">Dining Option</button>
      </div>
      <div class="mod-options" style="overflow-y:auto;max-height:340px;">
        <div style="font-size:11px;font-weight:700;color:#7b9cbf;text-transform:uppercase;letter-spacing:.07em;padding:4px 0 6px;">Size — Required</div>
        ${data.sizes.map(s => `<button class="mod-option spec-size-btn" data-action="pick-spec-size" data-val="${s.l}" data-price="${s.p}">${s.l} &nbsp; <span style="color:#f9c84a;font-weight:700">$${s.p.toFixed(2)}</span></button>`).join('')}
        ${data.ing.length ? `
        <div style="font-size:11px;font-weight:700;color:#7b9cbf;text-transform:uppercase;letter-spacing:.07em;padding:12px 0 6px;">Remove Ingredients</div>
        ${data.ing.map(i => `<button class="mod-option" data-action="toggle-spec-remove" data-val="${i.replace(/"/g,'&quot;')}" style="border-color:#c0392b55;">No ${i}</button>`).join('')}` : ''}
      </div>`;
    openMod();
  }

  function confirmSpecialty() {
    if (!_specSize) { toast('⚠️ Select a size first', 'err'); return; }
    let modifier = `Size: ${_specSize.label}`;
    if (_specRemovals.length) modifier += ` | No: ${_specRemovals.join(', ')}`;
    orderItems.push({ name: _specItem.name, price: _specSize.price, modifier });
    renderOrder(); closeMod();
    toast('Added: ' + _specItem.name + ' ' + _specSize.label);
  }

  // ── SALAD DRESSING MODIFIER ────────────────────────────────────
  function showDressingMod(item) {
    _dressingItem = item; _selectedDressing = null;
    const dressings = MENU.dressings.map(d => d.name);
    document.getElementById('modifierPanel').innerHTML = `
      <div class="mod-header">
        <div class="qty-control">
          <button class="qty-btn">−</button><div class="qty-display">1</div><button class="qty-btn">+</button>
        </div>
        <div class="mod-actions">
          <button class="mod-action-btn btn-cancel" data-action="close">✕ Cancel</button>
          <button class="mod-action-btn btn-done"   data-action="confirm-dressing">✓ Done</button>
        </div>
      </div>
      <div class="mod-title">${item.name}</div>
      <div class="mod-subtitle">Select a dressing (optional)</div>
      <div class="mod-tabs">
        <button class="mod-tab active">DRESSING</button>
        <button class="mod-tab">Special Request</button>
        <button class="mod-tab">Seat Number</button>
        <button class="mod-tab">Dining Option</button>
      </div>
      <div class="mod-options">
        ${dressings.map(d => `<button class="mod-option" data-action="pick-dressing" data-val="${d.replace(/"/g,'&quot;')}">${d}</button>`).join('')}
      </div>`;
    openMod();
  }

  function confirmDressing() {
    const modifier = _selectedDressing ? `Dressing: ${_selectedDressing}` : null;
    orderItems.push({ name: _dressingItem.name, price: _dressingItem.price, modifier });
    renderOrder(); closeMod();
    toast('Added: ' + _dressingItem.name);
  }

  // ── PIZZA CONE MODIFIER ────────────────────────────────────────
  function showConeMod() {
    _coneStep = 'type'; _selectedToppings = []; _selectedPasta = null;
    renderConeStep(); openMod();
  }

  function renderConeStep() {
    const panel = document.getElementById('modifierPanel');
    if (_coneStep === 'type') {
      panel.innerHTML = `
        <div class="mod-header">
          <div class="qty-control">
            <button class="qty-btn">−</button><div class="qty-display">1</div><button class="qty-btn">+</button>
          </div>
          <div class="mod-actions">
            <button class="mod-action-btn btn-cancel" data-action="close">✕ Cancel</button>
            <button class="mod-action-btn btn-done" style="background:#444;cursor:default;">✓ Done</button>
          </div>
        </div>
        <div class="mod-title">PIZZA CONE</div>
        <div class="mod-subtitle">Choose your filling</div>
        <div class="mod-tabs"><button class="mod-tab active">PIZZA CONE</button><button class="mod-tab">Seat Number</button><button class="mod-tab">Dining Option</button><button class="mod-tab">Special Request</button></div>
        <div class="mod-options">
          <button class="mod-option" data-action="pick-cone-type" data-val="pizza">PIZZA</button>
          <button class="mod-option" data-action="pick-cone-type" data-val="pasta">PASTA</button>
        </div>`;
    } else if (_coneStep === 'pizza') {
      panel.innerHTML = `
        <div class="mod-header">
          <div style="font-size:12px;color:#7b9cbf;">PIZZA CONE → PIZZA</div>
          <div class="mod-actions">
            <button class="mod-action-btn btn-cancel" data-action="close">✕ Cancel</button>
            <button class="mod-action-btn btn-done"   data-action="confirm-cone-top">✓ Done</button>
          </div>
        </div>
        <div class="mod-title">PIZZA</div>
        <div class="mod-subtitle">Select up to 2 toppings</div>
        <div class="mod-tabs"><button class="mod-tab active">TOPPINGS</button><button class="mod-tab">Special Request</button></div>
        <div class="mod-options">
          ${CONE_TOPPINGS.map(t => `<button class="mod-option" data-action="toggle-cone-top" data-val="${t.replace(/"/g,'&quot;')}">${t}</button>`).join('')}
        </div>`;
    } else if (_coneStep === 'pasta') {
      panel.innerHTML = `
        <div class="mod-header">
          <div style="font-size:12px;color:#7b9cbf;">PIZZA CONE → PASTA</div>
          <div class="mod-actions">
            <button class="mod-action-btn btn-cancel" data-action="close">✕ Cancel</button>
            <button class="mod-action-btn btn-done"   data-action="confirm-cone-pasta">✓ Done</button>
          </div>
        </div>
        <div class="mod-title">PASTA</div>
        <div class="mod-subtitle">Select a pasta type</div>
        <div class="mod-tabs"><button class="mod-tab active">PASTA TYPE</button><button class="mod-tab">ADD MEAT</button><button class="mod-tab">Special Request</button></div>
        <div class="mod-options">
          ${CONE_PASTAS.map(p => `<button class="mod-option" data-action="pick-cone-pasta" data-val="${p}">${p}</button>`).join('')}
        </div>`;
    }
  }

  function confirmConeTopping() {
    if (!_selectedToppings.length) { toast('⚠️ Select at least one topping', 'err'); return; }
    orderItems.push({ name:'PIZZA CONE', price:32.99, modifier:'Pizza: ' + _selectedToppings.join(', ') });
    renderOrder(); closeMod();
    toast('Added: PIZZA CONE — ' + _selectedToppings.join(', '));
  }

  function confirmConePasta() {
    if (!_selectedPasta) { toast('⚠️ Select a pasta type', 'err'); return; }
    orderItems.push({ name:'PIZZA CONE', price:32.99, modifier:'Pasta: ' + _selectedPasta });
    renderOrder(); closeMod();
    toast('Added: PIZZA CONE — ' + _selectedPasta);
  }

  // ── UTILITIES ──────────────────────────────────────────────────
  function openMod()  { document.getElementById('modifierOverlay').classList.add('active'); }
  function closeMod() { document.getElementById('modifierOverlay').classList.remove('active'); }

  let _toastTimer;
  function toast(msg, type) {
    const el = document.getElementById('feedbackToast');
    el.textContent = msg; el.style.background = type === 'err' ? '#7a2020' : '#1a5a2a';
    el.classList.add('show'); clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function handleSearch(val) {
    if (!val.trim()) { renderMenu(); return; }
    const q = val.toLowerCase(), grid = document.getElementById('menuGrid'), results = [];
    grid.innerHTML = '';
    Object.values(MENU).forEach(data => {
      if (!data) return;
      const items = Array.isArray(data) ? data : (data.items ? Object.values(data.items).flat() : []);
      items.forEach(item => { if (item.name && item.name.toLowerCase().includes(q)) results.push(item); });
    });
    const label = document.createElement('div');
    label.style.cssText = 'color:#7b9cbf;font-size:12px;padding:2px 0 8px;';
    label.textContent = results.length ? `${results.length} result${results.length>1?'s':''} for "${val}"` : `No results for "${val}"`;
    grid.appendChild(label);
    if (results.length) grid.appendChild(mkItemGrid(results.slice(0, 25)));
  }

  document.getElementById('sendBtn').onclick = () => {
    if (!orderItems.length) { toast('⚠️ No items to send', 'err'); return; }
    toast(`✓ Sent to kitchen — ${orderItems.length} item${orderItems.length>1?'s':''}!`);
  };

  document.getElementById('payBtn').onclick = () => {
    if (!orderItems.length) { toast('⚠️ No items to pay for', 'err'); return; }
    const sub = orderItems.reduce((s, i) => s + i.price, 0);
    toast(`✓ $${(sub*(1+TAX)).toFixed(2)} processed! (Training mode)`);
    setTimeout(clearOrder, 1600);
  };

  renderMenu(); renderOrder();
</script>
</body>
</html>
